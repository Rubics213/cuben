name: Production JS Security Scanner v3.2.1 Consensus Beta

on:
  push:
    branches: [main, master]
    paths:
      - 'targets.txt'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  actions: read

jobs:
  intelligent-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Directories
        run: |
          mkdir -p reports tmp stats
          echo "✅ Workspace ready"

      - name: Cache Tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-tools-v5

      - name: Install Dependencies
        run: |
          set -e
          echo "📦 Installing packages..."
          pip install --no-cache-dir groq openai google-generativeai aiohttp requests jsbeautifier || \
            pip install --break-system-packages groq openai google-generativeai aiohttp requests jsbeautifier

          if [[ ! -f ~/go/bin/katana ]]; then
            echo "Installing katana..."
            go install github.com/projectdiscovery/katana/cmd/katana@latest
          fi

          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          echo "✅ Dependencies ready"

      - name: Create Production Scanner
        run: |
          cat > production_js_scanner.py << 'PYTHON_SCRIPT'
          #!/usr/bin/env python3
          """Production JS Security Scanner v3.2

          KEY IMPROVEMENTS OVER v2.5:
          ─────────────────────────────────────────────────────────────────────────
          1. KNOWN LIBRARY FILTER      — findings in vendor/node_modules/pagefind/etc.
                                         are auto-demoted to INFO.
          2. PUBLIC EMAIL FILTER       — role-based email prefixes skipped entirely.
          3. ACTIVE HOSTNAME PROBE     — curl-probe before severity is assigned.
          4. EXPLOITABILITY TRIAGE     — AI asks "Would a program pay for this?"
          5. SEVERITY CALIBRATION      — infra must be reachable before exceeding MEDIUM.
          6. S3 BUCKET ACTIVE PROBE    — ListObjects request; listable → CRITICAL.
          7. THIRD-PARTY VENDOR FILTER — Google/FB/Stripe/etc. hostnames excluded.
          8. MULTI-LLM CONSENSUS       — Groq + GPT + Gemini vote independently.
                                         A finding is only REAL if the majority agree.
                                         Unanimous FP from any two models → demoted.
                                         Each model's verdict is recorded for auditability.
          ─────────────────────────────────────────────────────────────────────────
          """

          import os, sys, json, asyncio, re, hashlib, math, subprocess, time
          from typing import List, Dict, Optional, Set, Tuple
          from urllib.parse import urlparse
          import concurrent.futures

          # ─────────────────────────────────────────────────────────────────────────
          # FIX 1: KNOWN LIBRARY FILTER
          # Files matching these path patterns are almost always third-party code.
          # Findings inside them are demoted to INFO rather than suppressed entirely
          # so the data is still in the report, but they won't inflate your severity
          # counts or get emailed as critical findings.
          # ─────────────────────────────────────────────────────────────────────────
          LIBRARY_PATH_PATTERNS = [
              r'/node_modules/',
              r'[/\-_]vendors?[.\-_/]',        # vendor.js, vendors.min.js, /vendor/
              r'[/\-_]vendor\b',
              r'/bower_components/',
              r'pagefind',                       # Pagefind search library
              r'[/\-_]polyfills?[.\-_]',
              r'[/\-_]jquery[.\-_]',
              r'[/\-_]bootstrap[.\-_]',
              r'[/\-_]lodash[.\-_]',
              r'[/\-_]moment[.\-_]',
              r'[/\-_]react[.\-_]',
              r'[/\-_]angular[.\-_]',
              r'[/\-_]vue[.\-_]',
              r'[/\-_]d3[.\-_]',
              r'[/\-_]three[.\-_]',
              r'[/\-_]webpack[.\-_]',
              r'[/\-_]rollup[.\-_]',
              r'[/\-_]babel[.\-_]',
              r'[/\-_]core-js[.\-_]',
              r'[/\-_]regenerator[.\-_]',
              r'[/\-_]axios[.\-_]',
              r'[/\-_]socket\.io[.\-_]',
              r'[/\-_]highlight[.\-_]',         # Prism, Highlight.js
              r'[/\-_]prism[.\-_]',
              r'/cdn-cgi/',                      # Cloudflare edge scripts
              r'cdn\.jsdelivr\.net',
              r'cdnjs\.cloudflare\.com',
              r'unpkg\.com',
              r'cdn\.skypack\.dev',
              # Webpack chunk hashes: app.a1b2c3d4.js — likely built output but not
              # your app's logic; low signal-to-noise for PII/secrets. Keep as INFO.
              r'\.[a-f0-9]{8,}\.(chunk|bundle)\.js',
          ]

          def is_library_file(url: str) -> bool:
              """Return True if URL strongly suggests a third-party library."""
              url_lower = url.lower()
              return any(re.search(p, url_lower) for p in LIBRARY_PATH_PATTERNS)

          # ─────────────────────────────────────────────────────────────────────────
          # FIX 7: THIRD-PARTY VENDOR DOMAIN FILTER
          # The internal_hostname regex catches anything prefixed staging/dev/admin/etc.
          # But staging.googleapis.com or dev.facebook.com appearing in a JS bundle
          # is NOT the target's infrastructure — it's a vendor SDK endpoint.
          # Any hostname whose root domain is in this set is silently dropped from
          # infra findings.  Add to the list freely; it never touches secret/PII logic.
          # ─────────────────────────────────────────────────────────────────────────
          THIRD_PARTY_VENDOR_DOMAINS = {
              # Analytics & ads
              "google.com", "googleapis.com", "googletagmanager.com",
              "googleadservices.com", "googlesyndication.com", "doubleclick.net",
              "google-analytics.com", "googleoptimize.com",
              # Meta / Facebook
              "facebook.com", "facebook.net", "fbcdn.net", "instagram.com",
              # Microsoft / LinkedIn
              "microsoft.com", "microsoftonline.com", "live.com", "linkedin.com",
              "azure.com", "azurewebsites.net", "azurefd.net",
              # Amazon / AWS (vendor-side, not target S3 buckets)
              "amazonaws.com", "cloudfront.net", "awsstatic.com",
              # Payments
              "stripe.com", "stripe.network", "paypal.com", "braintreegateway.com",
              "checkout.com",
              # Communications
              "twilio.com", "sendgrid.net", "mailchimp.com", "mailgun.org",
              "postmarkapp.com",
              # Auth
              "auth0.com", "okta.com", "onelogin.com", "cognito-idp.amazonaws.com",
              # Forms / surveys
              "typeform.com", "surveymonkey.com",
              # CDN / infra
              "cloudflare.com", "fastly.net", "akamaized.net", "akamai.net",
              "jsdelivr.net", "unpkg.com", "cdnjs.cloudflare.com",
              # Monitoring / error tracking
              "sentry.io", "bugsnag.com", "datadog.com", "newrelic.com",
              "rollbar.com", "logrocket.com", "fullstory.com", "hotjar.com",
              "heap.io",
              # Social / comms
              "twitter.com", "x.com", "t.co", "tiktok.com", "snapchat.com",
              "discord.com", "slack.com", "intercom.io", "zendesk.com",
              # Maps
              "mapbox.com", "here.com",
              # Video
              "youtube.com", "vimeo.com", "wistia.com",
              # Apple
              "apple.com", "icloud.com",
          }

          def is_third_party_hostname(hostname: str) -> bool:
              """
              Return True if hostname belongs to a known third-party vendor.
              Checks exact match and all parent domains up to the public suffix
              so that staging.googleapis.com is caught by 'googleapis.com'.
              """
              hostname = hostname.lower().lstrip("http://").lstrip("https://")
              # Strip path/port if present
              hostname = hostname.split("/")[0].split(":")[0]
              parts = hostname.split(".")
              # Walk from most-specific to least-specific: a.b.c → b.c → c
              for i in range(len(parts) - 1):
                  candidate = ".".join(parts[i:])
                  if candidate in THIRD_PARTY_VENDOR_DOMAINS:
                      return True
              return False

          # ─────────────────────────────────────────────────────────────────────────
          # FIX 2: PUBLIC / ROLE-BASED EMAIL FILTER
          # These prefixes denote intentionally-public role mailboxes. They appear
          # in JS for legitimate reasons (contact forms, footer rendering, etc.) and
          # are never reportable as PII exposure in a bug bounty context.
          # ─────────────────────────────────────────────────────────────────────────
          PUBLIC_EMAIL_PREFIXES = [
              "info@", "support@", "sales@", "press@", "contact@", "hello@",
              "help@", "team@", "admin@", "webmaster@", "feedback@",
              "enquiries@", "enquiry@", "marketing@", "billing@", "accounts@",
              "legal@", "privacy@", "security@", "abuse@", "postmaster@",
              "noreply@", "no-reply@", "newsletter@", "unsubscribe@",
              "media@", "partnerships@", "partners@", "careers@", "jobs@",
              "hr@", "finance@", "compliance@", "operations@", "ops@",
              "dev@", "api@", "developer@", "developers@", "opensource@",
              "notifications@", "alerts@", "bot@", "system@", "automated@",
              "donotreply@", "do-not-reply@", "reply@",
          ]

          def is_public_email(address: str) -> bool:
              """Return True if this is a role-based / publicly intended email."""
              low = address.lower()
              return any(low.startswith(prefix) for prefix in PUBLIC_EMAIL_PREFIXES)

          # ─────────────────────────────────────────────────────────────────────────
          # FIX 3: ACTIVE HOSTNAME VERIFICATION
          # Before calling an internal hostname HIGH, we try to actually reach it.
          # Severity mapping based on what we find:
          #   • Resolves + returns 2xx/3xx  → KEEP severity (genuinely exposed)
          #   • Resolves + returns 401/403  → MEDIUM (exists but access-controlled)
          #   • Resolves + returns 4xx/5xx  → LOW (exists, broken or gated)
          #   • Does not resolve / timeout  → LOW (not reachable from internet)
          # ─────────────────────────────────────────────────────────────────────────
          def verify_hostname(hostname: str) -> Dict:
              """
              Curl the hostname (HTTPS first, then HTTP) and return a dict:
                reachable : bool
                http_code : str   ("000" = no response)
                severity  : str   recommended severity after probe
                note      : str   human-readable reason
              """
              result = {"reachable": False, "http_code": "000",
                        "severity": "LOW", "note": "probe_not_run"}

              def _probe(scheme: str) -> str:
                  """Return the HTTP status code string, or '000' on failure."""
                  try:
                      r = subprocess.run(
                          ["curl", "-sS", "--max-time", "7",
                           "-o", "/dev/null", "-w", "%{http_code}",
                           "--insecure",          # accept self-signed certs on internal hosts
                           "-A", "Mozilla/5.0 (compatible; SecurityScanner/1.0)",
                           f"{scheme}://{hostname}"],
                          capture_output=True, timeout=12
                      )
                      return r.stdout.decode("utf-8", errors="ignore").strip() or "000"
                  except Exception:
                      return "000"

              code = _probe("https")
              if code == "000":
                  code = _probe("http")    # fall back to plain HTTP

              result["http_code"] = code

              if code == "000":
                  result.update({"reachable": False, "severity": "LOW",
                                 "note": "hostname_not_reachable_from_internet"})
              elif code in ("401", "403"):
                  result.update({"reachable": True, "severity": "MEDIUM",
                                 "note": f"reachable_but_access_controlled_{code}"})
              elif code in ("404", "410"):
                  result.update({"reachable": True, "severity": "LOW",
                                 "note": f"reachable_but_not_found_{code}"})
              elif code.startswith("5"):
                  result.update({"reachable": True, "severity": "MEDIUM",
                                 "note": f"reachable_server_error_{code}"})
              elif code.startswith("2") or code.startswith("3"):
                  # Actually open — keep or escalate original severity
                  result.update({"reachable": True, "severity": "HIGH",
                                 "note": f"open_and_reachable_{code}"})
              else:
                  result.update({"reachable": True, "severity": "LOW",
                                 "note": f"unexpected_status_{code}"})

              return result

          # ─────────────────────────────────────────────────────────────────────────
          # FIX 6: S3 BUCKET ACTIVE PROBE
          # A bucket name in JS is not a finding by itself — the bucket could be
          # completely private. We issue a real ListObjects request (no auth) and
          # interpret the response:
          #
          #   2xx + <ListBucketResult>  → CRITICAL  publicly listable, contents exposed
          #   2xx without XML body      → HIGH       open but unclear exposure
          #   403 Forbidden             → INFO       bucket exists but is private (not reportable)
          #   404 / NoSuchBucket        → INFO       bucket doesn't exist (dangling ref)
          #   timeout / DNS failure     → LOW        not reachable from internet
          #
          # This eliminates the entire category of "every S3 mention = MEDIUM" noise.
          # ─────────────────────────────────────────────────────────────────────────
          def probe_s3_bucket(bucket_hostname: str) -> Dict:
              """
              Probe an S3 bucket with an unauthenticated ListObjects request.
              bucket_hostname is the full hostname, e.g. my-bucket.s3.amazonaws.com
              Returns dict: {severity, note, http_code, listable}
              """
              result = {"severity": "LOW", "note": "probe_not_run",
                        "http_code": "000", "listable": False}
              try:
                  r = subprocess.run(
                      ["curl", "-sS", "--max-time", "8",
                       "-o", "-",                          # capture body
                       "-w", "\n__STATUS__%{http_code}",  # append status at end
                       f"https://{bucket_hostname}/?list-type=2&max-keys=5"],
                      capture_output=True, timeout=13
                  )
                  raw = r.stdout.decode("utf-8", errors="ignore")
                  # Parse the appended status code marker
                  if "__STATUS__" in raw:
                      body, code = raw.rsplit("__STATUS__", 1)
                      code = code.strip()
                  else:
                      body, code = raw, "000"

                  result["http_code"] = code

                  if code.startswith("2"):
                      if "<ListBucketResult" in body or "<Contents>" in body:
                          result.update({
                              "severity": "CRITICAL",
                              "note": "bucket_publicly_listable_contents_exposed",
                              "listable": True,
                          })
                      else:
                          result.update({
                              "severity": "HIGH",
                              "note": "bucket_open_response_but_no_listing",
                              "listable": False,
                          })
                  elif code == "403":
                      result.update({
                          "severity": "INFO",
                          "note": "bucket_private_403_forbidden",
                          "listable": False,
                      })
                  elif code == "404" or "NoSuchBucket" in body:
                      result.update({
                          "severity": "INFO",
                          "note": "bucket_does_not_exist_404",
                          "listable": False,
                      })
                  elif code == "000":
                      result.update({
                          "severity": "LOW",
                          "note": "bucket_not_reachable_dns_or_timeout",
                          "listable": False,
                      })
                  else:
                      result.update({
                          "severity": "LOW",
                          "note": f"bucket_unexpected_status_{code}",
                          "listable": False,
                      })

              except Exception as e:
                  result.update({"severity": "LOW", "note": f"probe_error:{e}"})

              return result

          # ── Luhn algorithm (credit card validation) ───────────────────────────────
          def luhn_check(number: str) -> bool:
              digits = [int(d) for d in re.sub(r'[\s\-]', '', number) if d.isdigit()]
              if len(digits) < 13:
                  return False
              digits.reverse()
              total = sum(
                  d if i % 2 == 0 else (d * 2 - 9 if d * 2 > 9 else d * 2)
                  for i, d in enumerate(digits)
              )
              return total % 10 == 0

          # ── Passive credential validator ──────────────────────────────────────────
          def validate_credential(finding_type: str, value: str) -> Dict:
              """Single read-only API call to check if a credential is live.
              Returns {"live": bool, "note": str}. Never modifies the credential."""
              result = {"live": False, "note": "not_validated"}
              try:
                  if finding_type == "aws_access_key":
                      r = subprocess.run(
                          ["curl", "-sf", "--max-time", "8",
                           "https://sts.amazonaws.com/?Action=GetCallerIdentity&Version=2011-06-15"],
                          capture_output=True
                      )
                      body = r.stdout.decode("utf-8", errors="ignore")
                      if "InvalidClientTokenId" in body:
                          result = {"live": False, "note": "aws_key_invalid"}
                      elif "AuthFailure" in body or "SignatureDoesNotMatch" in body:
                          result = {"live": True, "note": "aws_key_format_valid_needs_secret"}
                      else:
                          result = {"live": False, "note": "aws_probe_inconclusive"}

                  elif finding_type == "stripe_secret":
                      r = subprocess.run(
                          ["curl", "-sf", "--max-time", "8",
                           "-u", f"{value}:", "https://api.stripe.com/v1/balance"],
                          capture_output=True
                      )
                      body = r.stdout.decode("utf-8", errors="ignore")
                      if r.returncode == 0 and '"object": "balance"' in body:
                          result = {"live": True, "note": "stripe_key_active_balance_readable"}
                      elif "No such API key" in body or "Invalid API Key" in body:
                          result = {"live": False, "note": "stripe_key_invalid"}
                      else:
                          result = {"live": False, "note": "stripe_probe_inconclusive"}

                  elif finding_type == "github_token":
                      r = subprocess.run(
                          ["curl", "-sf", "--max-time", "8",
                           "-H", f"Authorization: token {value}",
                           "https://api.github.com/user"],
                          capture_output=True
                      )
                      if r.returncode == 0:
                          body = r.stdout.decode("utf-8", errors="ignore")
                          if '"login"' in body:
                              result = {"live": True, "note": "github_token_active"}
                          else:
                              result = {"live": False, "note": "github_probe_inconclusive"}
                      else:
                          result = {"live": False, "note": "github_token_invalid"}

                  elif finding_type == "slack_token":
                      r = subprocess.run(
                          ["curl", "-sf", "--max-time", "8",
                           "-H", f"Authorization: Bearer {value}",
                           "https://slack.com/api/auth.test"],
                          capture_output=True
                      )
                      body = r.stdout.decode("utf-8", errors="ignore")
                      if '"ok":true' in body.replace(" ", ""):
                          result = {"live": True, "note": "slack_token_active"}
                      else:
                          result = {"live": False, "note": "slack_token_invalid_or_revoked"}

              except Exception as e:
                  result = {"live": False, "note": f"validation_error:{e}"}

              return result

          # ── Content-Length HEAD fetcher ────────────────────────────────────────────
          def _head_size(url: str) -> int:
              try:
                  r = subprocess.run(
                      ["curl", "-sI", "--max-time", "5",
                       "-A", "Mozilla/5.0 (compatible; SecurityScanner/1.0)", url],
                      capture_output=True, timeout=8
                  )
                  for line in r.stdout.decode("utf-8", errors="ignore").splitlines():
                      if line.lower().startswith("content-length:"):
                          return int(line.split(":", 1)[1].strip())
              except Exception:
                  pass
              return 0

          try:
              from groq import Groq
              GROQ_API_KEY = os.getenv("GROQ_API_KEY")
              groq_client = Groq(api_key=GROQ_API_KEY) if GROQ_API_KEY else None
              if groq_client:
                  print("✅ Groq triage active", file=sys.stderr)
              else:
                  print("⚠️ Groq key missing — skipping", file=sys.stderr)
          except Exception:
              groq_client = None
              print("⚠️ Groq import failed", file=sys.stderr)

          try:
              from openai import OpenAI
              OPENAI_API_KEY = os.getenv("OPENAI_API_KEY")
              openai_client = OpenAI(api_key=OPENAI_API_KEY) if OPENAI_API_KEY else None
              if openai_client:
                  print("✅ GPT triage active (rate-limited: 20s between calls)", file=sys.stderr)
              else:
                  print("⚠️ OpenAI key missing — skipping", file=sys.stderr)
          except Exception:
              openai_client = None
              print("⚠️ OpenAI import failed", file=sys.stderr)

          try:
              import google.generativeai as genai
              GEMINI_API_KEY = os.getenv("GEMINI_API_KEY")
              # Model preference order:
              #   gemini-3-flash-preview   — fast, frontier-class, generous free tier
              #   gemini-3.1-pro-preview   — most capable (replaces deprecated gemini-3-pro-preview)
              #   gemini-2.5-flash         — stable GA fallback if preview endpoints unavailable
              GEMINI_MODELS = [
                  "gemini-3-flash-preview",
                  "gemini-3.1-pro-preview",
                  "gemini-2.5-flash",
              ]
              if GEMINI_API_KEY:
                  genai.configure(api_key=GEMINI_API_KEY)
                  gemini_model = True   # sentinel — actual model name chosen per-call with fallback
                  print(f"✅ Gemini triage active (models: {', '.join(GEMINI_MODELS)})", file=sys.stderr)
              else:
                  gemini_model = None
                  print("⚠️ Gemini key missing — skipping", file=sys.stderr)
          except Exception as e:
              gemini_model = None
              GEMINI_MODELS = []
              print(f"⚠️ Gemini import failed: {e}", file=sys.stderr)

          # Legacy alias — some internal checks use `client` to test if any AI is available
          client = groq_client or openai_client or gemini_model

          active_providers = sum([
              groq_client is not None,
              openai_client is not None,
              gemini_model is not None,
          ])
          print(f"🤖 {active_providers} AI provider(s) active — "
                f"{'majority vote enabled' if active_providers >= 2 else 'single-model triage'}",
                file=sys.stderr)

          # ── Secret patterns ──────────────────────────────────────────────────────
          PATTERNS = {
              "private_key": {
                  "regex": r'-----BEGIN (?:RSA |EC )?PRIVATE KEY-----',
                  "severity": "CRITICAL", "min_entropy": 0, "category": "secret",
              },
              "aws_access_key": {
                  "regex": r'\b((?:AKIA|ASIA)[A-Z0-9]{16})\b',
                  "severity": "CRITICAL", "min_entropy": 3.5, "category": "secret",
              },
              "aws_secret_key": {
                  "regex": r'(?i)aws.{0,20}secret.{0,20}["\']([A-Za-z0-9/+=]{40})["\']',
                  "severity": "CRITICAL", "min_entropy": 4.5, "category": "secret",
              },
              "github_token": {
                  "regex": r'\b(gh[pousr]_[A-Za-z0-9_]{36,})\b',
                  "severity": "CRITICAL", "min_entropy": 4.0, "category": "secret",
              },
              "slack_token": {
                  "regex": r'\b(xox[baprs]-[0-9A-Za-z\-]{10,})\b',
                  "severity": "CRITICAL", "min_entropy": 3.5, "category": "secret",
              },
              "stripe_secret": {
                  "regex": r'\b(sk_(?:live|test)_[A-Za-z0-9]{24,})\b',
                  "severity": "CRITICAL", "min_entropy": 4.0, "category": "secret",
              },
              "sendgrid_key": {
                  "regex": r'\b(SG\.[A-Za-z0-9_\-]{22,}\.[A-Za-z0-9_\-]{43,})\b',
                  "severity": "CRITICAL", "min_entropy": 4.5, "category": "secret",
              },
              "twilio_key": {
                  "regex": r'\b(SK[0-9a-fA-F]{32})\b',
                  "severity": "CRITICAL", "min_entropy": 3.5, "category": "secret",
              },
              "jwt_secret": {
                  "regex": r'\b(eyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,})\b',
                  "severity": "HIGH", "min_entropy": 4.0, "category": "secret",
              },
              "generic_secret": {
                  "regex": r'(?i)(?:secret|password|passwd|token|auth_key)\s*[:=]\s*["\']([A-Za-z0-9!@#$%^&*_+\-]{20,})["\']',
                  "severity": "HIGH", "min_entropy": 4.2, "category": "secret",
              },
              "generic_api_key": {
                  "regex": r'(?i)api[_\-]?key\s*[:=]\s*["\']([A-Za-z0-9_\-]{20,})["\']',
                  "severity": "HIGH", "min_entropy": 4.0, "category": "secret",
              },
              "hardcoded_password": {
                  "regex": r'(?i)(?:password|passwd|pwd)\s*[:=]\s*["\']([^"\']{8,})["\']',
                  "severity": "CRITICAL", "min_entropy": 3.5, "category": "secret",
